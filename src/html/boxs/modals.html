<div class="modal" id="send-feedback">
  <div class="modal__body">
    <button class="modal__close send-feedback__close btn-reset js-close-modal">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M0.499396 11.8137L11.8131 0.499994M0.499396 0.499994L11.8131 11.8137" stroke="currentColor" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="send-feedback__window">
      <form>
        <div class="send-feedback__wrapper">
          <h4 class="send-feedback__title">
            Напишите, что думаете об этом товаре. С чувством и эмоциями...
          </h4>

          <div class="send-feedback__group js-box-message">
            <textarea class="textarea-type-10 js-textarea-message" placeholder="Начните вводить текст вашего отзыва"></textarea>
            <span class="send-feedback__marker">Ограничение: <span class="js-count-message">2000</span> символов</span>
            <p class="send-feedback__desc">Мы проверяем все отзывы перед публикацией — это занимает до 5 рабочих дней</p>
          </div>

          <button class="send-feedback__btn btn-reset" type="submit">
            <span class="text">Отправить отзыв</span>
          </button>
        </div>
        <div class="send-feedback__success-message" style="display: none;">
          <h4 class="send-feedback__title">Сообщение отправлено. Благодарим вас за отзыв!</h4>
          <p class="send-feedback__desc">Мы проверяем все отзывы перед публикацией — это занимает до 5 рабочих дней</p>
        </div>
      </form>
    </div>
  </div>
</div>
