<section class="section-hero-catalog">
  <div class="section-hero-catalog__container x2_j_container">
    <div class="section-hero-catalog__box-swiper">
      <div class="swiper-hero-catalog swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <article class="card-hero-catalog">
              <picture>
                <source srcset="img/card-hero-catalog/1-1000.png" media="(max-width: 1000px)">
                <source srcset="img/card-hero-catalog/1-1100.png" media="(max-width: 1200px)">
                <img src="img/card-hero-catalog/1.png" alt="img">
              </picture>
            </article> 
          </div>
          <div class="swiper-slide">
            <article class="card-hero-catalog">
              <picture>
                <source srcset="img/card-hero-catalog/1-1000.png" media="(max-width: 1000px)">
                <source srcset="img/card-hero-catalog/1-1100.png" media="(max-width: 1200px)">
                <img src="img/card-hero-catalog/1.png" alt="img">
              </picture>
            </article> 
          </div>
          <div class="swiper-slide">
            <article class="card-hero-catalog">
              <picture>
                <source srcset="img/card-hero-catalog/1-1000.png" media="(max-width: 1000px)">
                <source srcset="img/card-hero-catalog/1-1100.png" media="(max-width: 1200px)">
                <img src="img/card-hero-catalog/1.png" alt="img">
              </picture>
            </article> 
          </div>
        </div>
        <div class="swiper-hero-catalog__group-btn">
          <button class="btn-swiper-catalog --prev btn-reset">
            <svg width="10" height="13" viewBox="0 0 10 13" fill="none">
              <use xlink:href="img/sprite.svg#btnSwiperCatPrev"></use>
            </svg>
          </button>
          <button class="btn-swiper-catalog --next btn-reset">
            <svg width="10" height="13" viewBox="0 0 10 13" fill="none">
              <use xlink:href="img/sprite.svg#btnSwiperCatNext"></use>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
