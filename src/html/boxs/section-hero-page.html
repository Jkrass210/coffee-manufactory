<section class="section-hero section-hero-page section">
  <div class="section-hero__top">
    <div class="section-hero__box-swiper">
      <div class="swiper-hero swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <div class="card-hero">
              <div class="card-hero__container x2_j_container">
                <div class="card-hero__info">
                  <div class="card-hero__info-top">
                    <img src="img/page-school/section-hero-page/1.svg" alt="svg">
                    <p class="card-hero__desc">
                      Школа кофе из Петербурга для свободных духом
                    </p>
                  </div>
                  <div class="card-hero__info-bottom">
                    <button class="section-hero-page__btn btn-reset">
                      Записаться на курс
                    </button>
                  </div>
                </div>
              </div>
              <picture>
                <source srcset="img/page-school/section-hero-page/card-img(710).jpg" media="(max-width: 1000px)">
                <source srcset="img/page-school/section-hero-page/card-img(1100).jpg" media="(max-width: 1200px)">
                <img class="card-hero__img" src="img/page-school/section-hero-page/card-img.jpg" alt="img">
              </picture>
            </div>
          </div>

        </div>
        <div class="swiper-hero-pagination"></div>
      </div>
    </div>
  </div>
</section>
